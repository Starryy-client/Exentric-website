      ::selection { background: var(--violet); color: #fff; }

      /* ambient particle canvas */
      #bg-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      /* subtle grain / noise glass overlay for depth */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
        background-size: 3px 3px;
        opacity: 0.5;
        mix-blend-mode: overlay;
      }

      .glow-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(110px);
        opacity: 0.4;
        z-index: 0;
        pointer-events: none;
      }

      .glow-orb.one {
        width: 560px;
        height: 560px;
        background: var(--electric);
        top: -200px;
        left: -180px;
        animation: float1 20s ease-in-out infinite;
      }

      .glow-orb.two {
        width: 520px;
        height: 520px;
        background: var(--violet);
        bottom: -220px;
        right: -180px;
        animation: float2 24s ease-in-out infinite;
      }

      .glow-orb.three {
        width: 380px;
        height: 380px;
        background: var(--ion);
        top: 40%;
        left: 50%;
        opacity: 0.16;
        animation: float3 26s ease-in-out infinite;
      }

      @keyframes float1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(70px, 50px) scale(1.08); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-60px, -40px) scale(1.1); }
      }
      @keyframes float3 {
        0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
        50% { transform: translate(-46%, -54%) rotate(20deg); }
      }

      /* ---------- LOGO MARK ---------- */
      .mark-svg { display: block; overflow: visible; filter: drop-shadow(0 0 8px rgba(120, 100, 255, 0.35)); }
      .mark-svg .hex-path {
        stroke-dasharray: 420;
        stroke-dashoffset: 420;
        animation: hexDraw 1.7s cubic-bezier(.16, 1, .3, 1) forwards;
        animation-delay: .25s;
      }
      .mark-svg .bolt-fill { transform-origin: 100px 100px; animation: boltPulse 3.6s ease-in-out infinite; }
      @keyframes hexDraw { to { stroke-dashoffset: 0; } }
      @keyframes boltPulse {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(91, 127, 255, .55)); opacity: 0.92; }
        50% { filter: drop-shadow(0 0 15px rgba(163, 92, 246, .8)); opacity: 1; }
      }

      /* NAV — glass pill */
      nav.topnav {
        position: fixed;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 36px;
        background: rgba(18, 19, 27, 0.55);
        border: 1px solid var(--border);
        backdrop-filter: blur(var(--glass-blur)) saturate(160%);
        -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(160%);
        padding: 12px 22px;
        border-radius: 999px;
        box-shadow: 0 8px 34px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255,255,255,0.06);
        animation: navIn .8s cubic-bezier(.16, 1, .3, 1) both;
        transition: border-color .4s ease, box-shadow .4s ease;
      }
      nav.topnav:hover { border-color: rgba(163, 92, 246, 0.25); }

      @keyframes navIn {
        from { opacity: 0; transform: translate(-50%, -20px) scale(0.96); }
        to { opacity: 1; transform: translate(-50%, 0) scale(1); }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 17px;
        letter-spacing: -0.02em;
        color: var(--ink);
        white-space: nowrap;
      }
      .brand .mark-svg { width: 28px; height: 28px; }

      .nav-tabs {
        position: relative;
        display: flex;
        align-items: center;
        gap: 4px;
        background: rgba(255, 255, 255, 0.035);
        padding: 4px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.04);
      }

      .nav-tabs .pill {
        position: absolute;
        top: 4px;
        left: 4px;
        height: calc(100% - 8px);
        background: linear-gradient(120deg, rgba(91, 127, 255, 0.95), rgba(163, 92, 246, 0.95));
        border-radius: 999px;
        transition: transform 0.5s cubic-bezier(.65, 0, .35, 1), width 0.5s cubic-bezier(.65, 0, .35, 1);
        z-index: 0;
        box-shadow: 0 0 22px rgba(120, 100, 255, 0.55), inset 0 1px 0 rgba(255,255,255,0.25);
      }

      .nav-tabs button {
        position: relative;
        z-index: 1;
        background: none;
        border: none;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 14px;
        color: var(--dim);
        padding: 8px 18px;
        border-radius: 999px;
        transition: color 0.3s ease;
        white-space: nowrap;
      }
      .nav-tabs button.active { color: #fff; }

      /* PAGES */
      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: none;
        padding: 170px 24px 100px;
        opacity: 0;
        transform: translateY(18px);
      }

      .page.active { display: block; opacity: 1; transform: translateY(0); }
      .page.enter { animation: pageIn 0.75s cubic-bezier(.16, 1, .3, 1) forwards; }
      .page.leave { animation: pageOut 0.4s cubic-bezier(.6,0,1,1) forwards; }

      @keyframes pageIn {
        from { opacity: 0; transform: translateY(28px) scale(0.985); filter: blur(6px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      @keyframes pageOut {
        from { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        to { opacity: 0; transform: translateY(-18px) scale(0.985); filter: blur(6px); }
      }

      .container { max-width: 1040px; margin: 0 auto; }

      /* HOME */
      .hero { text-align: center; display: flex; flex-direction: column; align-items: center; }

      .anim-item { opacity: 0; transform: translateY(20px); }
      .anim-item.show { animation: itemIn .7s cubic-bezier(.16, 1, .3, 1) forwards; }
      @keyframes itemIn { to { opacity: 1; transform: translateY(0); } }

      .hero-badge {

        height: 100px;
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 34px;
        position: relative;
        background: var(--surface);
        border: 1px solid var(--border);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        padding: 18px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 20px 50px rgba(0,0,0,0.4);
      }
      .hero-badge .mark-svg { width: 100%; height: 100%; }
      .hero-badge::after {
        content: '';
        position: absolute;
        inset: -14px;
        border-radius: 34px;
        background: var(--grad);

        opacity: 0.5;

        animation: pulseGlow 3.4s ease-in-out infinite;

      @keyframes pulseGlow {

        animation: gradShift 6s ease infinite;

      @keyframes gradShift {

        font-family: 'Space Grotesk', sans-serif;

        font-size: clamp(20px, 3vw, 28px);
